{% extends "shared/layouts/base_role.html" %}
{% block title %}Project Resources{% endblock %}

{% block content %}
<div class="content-wrapper">
    <div class="top-header">
        <h2 class="h4 mb-0">Nguồn Lực Theo Dự Án</h2>
    </div>

    <!-- Filter Bar -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Dự Án</label>
                    <select class="form-select" id="projectFilter">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Phòng Ban</label>
                    <select class="form-select" id="departmentFilter">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Lọc
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Project Resources List -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Dự Án</th>
                            <th>Quản Lý Dự Án</th>
                            <th>Số Thành Viên</th>
                            <th>Tổng Allocation</th>
                            <th>Ngân Sách Nhân Sự</th>
                            <th>Chi Tiết</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" class="text-center text-muted">Chưa có dữ liệu</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
