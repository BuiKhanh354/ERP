{% extends "shared/layouts/base_role.html" %}
{% block title %}Actual Costs{% endblock %}

{% block content %}
<div class="content-wrapper">
    <div class="top-header">
        <h2 class="h4 mb-0">Chi Phí Thực Tế</h2>
    </div>

    <!-- Filter Bar -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Dự Án</label>
                    <select class="form-select" id="projectFilter">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Danh Mục</label>
                    <select class="form-select" id="categoryFilter">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tìm Kiếm</label>
                    <input type="text" class="form-control" id="searchInput" placeholder="Tên chi phí...">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Lọc
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Costs Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Chi Phí</th>
                            <th>Dự Án</th>
                            <th>Danh Mục</th>
                            <th>Số Tiền</th>
                            <th>Ngày</th>
                            <th>Mô Tả</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" class="text-center text-muted">Chưa có dữ liệu</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
