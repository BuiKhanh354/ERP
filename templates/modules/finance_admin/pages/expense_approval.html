{% extends "shared/layouts/base_role.html" %}
{% block title %}Expense Approval{% endblock %}

{% block content %}
<div class="content-wrapper">
    <div class="top-header">
        <h2 class="h4 mb-0">Duyệt Chi Phí</h2>
    </div>

    <!-- Filter Bar -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Trạng Thái</label>
                    <select class="form-select" id="statusFilter">
                        <option value="">Tất cả</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Dự Án</label>
                    <select class="form-select" id="projectFilter">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Danh Mục</label>
                    <select class="form-select" id="categoryFilter">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tìm Kiếm</label>
                    <input type="text" class="form-control" id="searchInput" placeholder="Tên chi phí, vendor...">
                </div>
                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button class="btn btn-primary flex-fill">
                        <i class="bi bi-search"></i> Lọc
                    </button>
                    <button class="btn btn-success" id="bulkApproveBtn" disabled>
                        <i class="bi bi-check-all"></i> Duyệt Hàng Loạt
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Approval Queue Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>
                                <input type="checkbox" id="selectAll" class="form-check-input">
                            </th>
                            <th>Chi Phí ID</th>
                            <th>Dự Án</th>
                            <th>Danh Mục</th>
                            <th>Vendor</th>
                            <th>Số Tiền</th>
                            <th>Ngày</th>
                            <th>Receipt</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="9" class="text-center text-muted">Không có chi phí chờ duyệt</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
