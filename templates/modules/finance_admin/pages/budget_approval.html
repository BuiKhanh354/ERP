{% extends "shared/layouts/base_role.html" %}
{% block title %}Budget Approval{% endblock %}

{% block content %}
<div class="content-wrapper">
    <div class="top-header">
        <h2 class="h4 mb-0">Duyệt Ngân Sách</h2>
    </div>

    <!-- Filter Bar -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Trạng Thái</label>
                    <select class="form-select" id="statusFilter">
                        <option value="">Tất cả</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Dự Án</label>
                    <select class="form-select" id="projectFilter">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tìm Kiếm</label>
                    <input type="text" class="form-control" id="searchInput" placeholder="Tên dự án, người yêu cầu...">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Lọc
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Approval Queue Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Dự Án</th>
                            <th>Ngân Sách Hiện Tại</th>
                            <th>Số Tiền Yêu Cầu</th>
                            <th>Người Yêu Cầu</th>
                            <th>Lý Do</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" class="text-center text-muted">Không có yêu cầu chờ duyệt</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
