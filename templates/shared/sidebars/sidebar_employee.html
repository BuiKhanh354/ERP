<div class="menu-section">
  <div class="menu-section-title">Nhiệm vụ</div>
  <a
    href="{% url 'projects:my_tasks' %}"
    class="menu-item {% if 'projects' in request.resolver_match.namespace and request.resolver_match.url_name == 'my_tasks' %}active{% endif %}"
  >
    <i class="bi bi-person-check"></i>
    <span>Công việc của tôi</span>
  </a>
  <a
    href="{% url 'projects:delay_kpi_dashboard' %}"
    class="menu-item {% if 'projects' in request.resolver_match.namespace and request.resolver_match.url_name in 'delay_kpi_dashboard,delay_kpi_data,delay_kpi_export_csv' %}active{% endif %}"
  >
    <i class="bi bi-exclamation-triangle"></i>
    <span>Delay KPI cá nhân</span>
  </a>
</div>

<div class="menu-section">
  <div class="menu-section-title">Theo dõi giờ công</div>
  <a
    href="{% url 'employee_module:time-entry-list' %}"
    class="menu-item {% if request.resolver_match.url_name == 'time-entry-list' or request.resolver_match.url_name == 'time-entry' %}active{% endif %}"
  >
    <i class="bi bi-clock"></i>
    <span>Time Entry</span>
  </a>
</div>

<div class="menu-section">
  <div class="menu-section-title">Chat với PRM AI</div>
  <a
    href="{% url 'core:ai-chat' %}"
    class="menu-item {% if request.resolver_match.url_name == 'ai-chat' or request.resolver_match.url_name == 'ai-chat-history' %}active{% endif %}"
  >
    <i class="bi bi-chat-dots"></i>
    <span>Chat với PRM AI</span>
  </a>
</div>
