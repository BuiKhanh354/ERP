{# 
  Usage: 
  {% include "shared/components/kpi_card.html" with title="Doanh thu" value=total_revenue icon="bi-cash" color="success" description="Tăng 5% so với tháng trước" %}
#}
<div class="card kpi-card border-left-{{ color|default:'primary' }} shadow h-100 py-2">
    <div class="card-body">
        <div class="row no-gutters align-items-center">
            <div class="col mr-2">
                <div class="text-xs font-weight-bold text-{{ color|default:'primary' }} text-uppercase mb-1">
                    {{ title }}</div>
                <div class="h5 mb-0 font-weight-bold text-gray-800">{{ value }}</div>
                {% if description %}
                <p class="mt-2 mb-0 text-muted text-xs">
                    {{ description }}
                </p>
                {% endif %}
            </div>
            <div class="col-auto">
                <i class="bi {{ icon }} fa-2x text-gray-300"></i>
            </div>
        </div>
    </div>
</div>
