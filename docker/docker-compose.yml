version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - erp_network

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: gunicorn erp.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ..:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db
    networks:
      - erp_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - web
    networks:
      - erp_network

volumes:
  mssql_data:
  static_volume:
  media_volume:

networks:
  erp_network:
    driver: bridge

